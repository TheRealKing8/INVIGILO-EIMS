services:
  postgres:
    image: postgres:16-alpine
    container_name: invigilo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invigilo}
      POSTGRES_USER: ${POSTGRES_USER:-invigilo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invigilo} -d ${POSTGRES_DB:-invigilo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: invigilo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
